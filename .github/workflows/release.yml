name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "Commit: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qiE "^(feat|feature)(\(.*\))?(!)?: "; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^(fix|chore|docs)(\(.*\))?: "; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
            echo "No release prefix — skipping."
          fi

      - name: Read current version
        if: steps.bump.outputs.type != 'none'
        id: current
        run: |
          MARKETING=$(grep -m1 'MARKETING_VERSION' tully.xcodeproj/project.pbxproj \
            | awk -F' = ' '{print $2}' | tr -d ';')
          BUILD=$(grep -m1 'CURRENT_PROJECT_VERSION' tully.xcodeproj/project.pbxproj \
            | awk -F' = ' '{print $2}' | tr -d ';')
          echo "marketing=$MARKETING" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Compute new version
        if: steps.bump.outputs.type != 'none'
        id: newver
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
          CURRENT_VER: ${{ steps.current.outputs.marketing }}
          CURRENT_BUILD: ${{ steps.current.outputs.build }}
        run: |
          IFS='.' read -r major minor patch <<< "$CURRENT_VER"
          minor=${minor:-0}; patch=${patch:-0}
          if [ "$BUMP_TYPE" = "minor" ]; then
            minor=$((minor + 1)); patch=0
          else
            patch=$((patch + 1))
          fi
          echo "marketing=$major.$minor.$patch" >> $GITHUB_OUTPUT
          echo "build=$((CURRENT_BUILD + 1))" >> $GITHUB_OUTPUT

      - name: Bump version in pbxproj
        if: steps.bump.outputs.type != 'none'
        env:
          NEW_VER: ${{ steps.newver.outputs.marketing }}
          OLD_BUILD: ${{ steps.current.outputs.build }}
          NEW_BUILD: ${{ steps.newver.outputs.build }}
        run: |
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $NEW_VER;/g" \
            tully.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = $OLD_BUILD;/CURRENT_PROJECT_VERSION = $NEW_BUILD;/g" \
            tully.xcodeproj/project.pbxproj

      - name: Build Release
        if: steps.bump.outputs.type != 'none'
        run: |
          xcodebuild \
            -project tully.xcodeproj \
            -scheme tully \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build \
          2>&1 | grep -E "error:|BUILD (SUCCEEDED|FAILED)"

      - name: Package
        if: steps.bump.outputs.type != 'none'
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData/tully-*/Build/Products/Release \
            -name "tully.app" -maxdepth 1 | head -1)
          ditto -c -k --keepParent "$APP" tully.zip

      - name: Sign with Sparkle
        if: steps.bump.outputs.type != 'none'
        id: sign
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN=$(find ~/Library/Developer/Xcode/DerivedData/tully-*/SourcePackages/checkouts/Sparkle \
            -path "*artifacts/sparkle/Sparkle/bin/sign_update" | head -1)
          printf '%s' "$SPARKLE_KEY" > /tmp/sparkle.key
          OUTPUT=$("$SIGN" tully.zip --ed-key-file /tmp/sparkle.key)
          rm -f /tmp/sparkle.key
          ED_SIG=$(echo "$OUTPUT" | grep -oE 'sparkle:edSignature="[^"]+"' | cut -d'"' -f2)
          LENGTH=$(stat -f%z tully.zip)
          echo "edSignature=$ED_SIG" >> $GITHUB_OUTPUT
          echo "length=$LENGTH" >> $GITHUB_OUTPUT

      - name: Update appcast
        if: steps.bump.outputs.type != 'none'
        env:
          NEW_VER: ${{ steps.newver.outputs.marketing }}
          NEW_BUILD: ${{ steps.newver.outputs.build }}
          ED_SIG: ${{ steps.sign.outputs.edSignature }}
          ZIP_LEN: ${{ steps.sign.outputs.length }}
          REPO: ${{ github.repository }}
        run: |
          python3 scripts/update_appcast.py \
            --version "$NEW_VER" \
            --build   "$NEW_BUILD" \
            --sig     "$ED_SIG" \
            --length  "$ZIP_LEN" \
            --repo    "$REPO"

      - name: Commit, tag, push
        if: steps.bump.outputs.type != 'none'
        env:
          NEW_VER: ${{ steps.newver.outputs.marketing }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tully.xcodeproj/project.pbxproj docs/appcast.xml
          git commit -m "chore: bump version to $NEW_VER"
          git tag "v$NEW_VER"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.newver.outputs.marketing }}
          name: v${{ steps.newver.outputs.marketing }}
          files: tully.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
